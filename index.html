<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Controle de Vagas 2026/2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800" x-data="dashboardData()">

  <!-- Header -->
  <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <div class="flex items-center space-x-3">
        <div class="bg-indigo-600 text-white p-2 rounded-lg"><i class="fa-solid fa-chart-line text-lg"></i></div>
        <div>
          <h1 class="text-lg font-bold text-slate-950">Controle de Vagas</h1>
          <p class="text-xs text-slate-500">Vestibular 2026/2</p>
        </div>
      </div>
      <div class="text-right hidden sm:block">
        <span class="text-xs text-slate-400">Última atualização</span>
        <p class="text-sm font-semibold text-slate-700">22/07/2026 12:54:47</p>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-8">

    <!-- KPI Cards -->
    <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
      <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex items-center space-x-4">
        <div class="p-3 bg-blue-50 text-blue-600 rounded-xl"><i class="fa-solid fa-graduation-cap text-2xl"></i></div>
        <div>
          <p class="text-sm text-slate-500 font-medium">Vagas Ofertadas</p>
          <h3 class="text-2xl font-bold text-slate-900" x-text="getKpis().vagas">0</h3>
          <span class="text-xs text-slate-400" x-text="getKpis().vagasSub"></span>
        </div>
      </div>

      <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex items-center space-x-4">
        <div class="p-3 bg-purple-50 text-purple-600 rounded-xl"><i class="fa-solid fa-users text-2xl"></i></div>
        <div>
          <p class="text-sm text-slate-500 font-medium">Inscrições Totais</p>
          <h3 class="text-2xl font-bold text-slate-900" x-text="getKpis().inscricoes">0</h3>
          <span class="text-xs text-purple-600 font-semibold" x-text="getKpis().demanda"></span>
        </div>
      </div>

      <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex items-center space-x-4">
        <div class="p-3 bg-emerald-50 text-emerald-600 rounded-xl"><i class="fa-solid fa-user-check text-2xl"></i></div>
        <div>
          <p class="text-sm text-slate-500 font-medium" x-text="getKpis().sucessoLabel">Sucesso</p>
          <h3 class="text-2xl font-bold text-slate-900" x-text="getKpis().sucessoValor">0</h3>
          <span class="text-xs text-emerald-600 font-semibold" x-text="getKpis().taxaSucesso"></span>
        </div>
      </div>

      <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex items-center space-x-4">
        <div class="p-3 bg-amber-50 text-amber-600 rounded-xl"><i class="fa-solid fa-id-card text-2xl"></i></div>
        <div>
          <p class="text-sm text-slate-500 font-medium" x-text="getKpis().apoioLabel">Apoio</p>
          <h3 class="text-2xl font-bold text-slate-900" x-text="getKpis().apoioValor">0</h3>
          <span class="text-xs text-amber-600 font-semibold" x-text="getKpis().apoioSub"></span>
        </div>
      </div>
    </section>

    <!-- Navegação / Abas -->
    <section class="space-y-4">
      <div class="border-b border-slate-200">
        <nav class="-mb-px flex space-x-8 overflow-x-auto">
          <button @click="tab = 'vestibular'" :class="tab === 'vestibular' ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-slate-500'" class="py-4 px-1 border-b-2 font-medium text-sm">
            <i class="fa-solid fa-award mr-2"></i>Vagas Vestibular
          </button>
          <button @click="tab = 'cebas'" :class="tab === 'cebas' ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-slate-500'" class="py-4 px-1 border-b-2 font-medium text-sm">
            <i class="fa-solid fa-hand-holding-heart mr-2"></i>Vagas CEBAS
          </button>
          <button @click="tab = 'combinada'" :class="tab === 'combinada' ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-slate-500'" class="py-4 px-1 border-b-2 font-medium text-sm">
            <i class="fa-solid fa-globe mr-2"></i>Visão Geral Combinada
          </button>
        </nav>
      </div>

      <!-- Filtros -->
      <div class="flex flex-col sm:flex-row gap-4 justify-between items-center bg-white p-4 rounded-xl border border-slate-200">
        <input type="text" x-model="searchTerm" placeholder="Buscar por curso..." class="w-full sm:w-96 px-4 py-2 border rounded-lg text-sm">
        <div class="flex space-x-2">
          <button @click="filtroPeriodo = ''" :class="filtroPeriodo === '' ? 'bg-indigo-50 text-indigo-600' : 'bg-slate-50'" class="px-3 py-1.5 text-xs font-semibold rounded-lg border">Todos</button>
          <button @click="filtroPeriodo = 'Noturno'" :class="filtroPeriodo === 'Noturno' ? 'bg-indigo-50 text-indigo-600' : 'bg-slate-50'" class="px-3 py-1.5 text-xs font-semibold rounded-lg border">Noturno</button>
          <button @click="filtroPeriodo = 'Matutino'" :class="filtroPeriodo === 'Matutino' ? 'bg-indigo-50 text-indigo-600' : 'bg-slate-50'" class="px-3 py-1.5 text-xs font-semibold rounded-lg border">Matutino</button>
          <button @click="filtroPeriodo = 'Ead'" :class="filtroPeriodo === 'Ead' ? 'bg-indigo-50 text-indigo-600' : 'bg-slate-50'" class="px-3 py-1.5 text-xs font-semibold rounded-lg border">EaD</button>
        </div>
      </div>
    </section>

    <!-- Tabela -->
    <section class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse text-sm">
          <thead>
            <tr class="bg-slate-50 text-slate-500 font-semibold border-b border-slate-200 text-xs uppercase">
              <th class="py-4 px-6">Curso</th>
              <th class="py-4 px-6">Período</th>
              <template x-if="tab === 'vestibular'">
                <th class="py-4 px-6">Vagas</th>
                <th class="py-4 px-6">Inscrições Totais</th>
                <th class="py-4 px-6">Classificados</th>
                <th class="py-4 px-6">Matrículas Pagas</th>
              </template>
              <template x-if="tab === 'cebas'">
                <th class="py-4 px-6">Vagas CEBAS</th>
                <th class="py-4 px-6">Inscrições</th>
                <th class="py-4 px-6">Classificados</th>
                <th class="py-4 px-6 text-indigo-600 font-bold">Matriculados</th>
                <th class="py-4 px-6">Lista de Espera</th>
                <th class="py-4 px-6">Doc. em Análise</th>
              </template>
              <template x-if="tab === 'combinada'">
                <th class="py-4 px-6">Vagas Totais</th>
                <th class="py-4 px-6">Inscrições Totais</th>
                <th class="py-4 px-6">Total Aprovados</th>
                <th class="py-4 px-6">Total Matriculados</th>
              </template>
            </tr>
          </thead>
          <tbody class="divide-y divide-slate-100">
            <template x-for="(item, index) in filteredList" :key="index">
              <tr class="hover:bg-slate-50/80">
                <td class="py-4 px-6 font-semibold" x-text="item.curso"></td>
                <td class="py-4 px-6"><span class="px-2.5 py-0.5 rounded-full text-xs font-medium bg-slate-100" x-text="item.periodo"></span></td>
                <template x-if="tab === 'vestibular'">
                  <td class="py-4 px-6" x-text="item.vagas"></td>
                  <td class="py-4 px-6" x-text="item.inscritos"></td>
                  <td class="py-4 px-6" x-text="item.classificados"></td>
                  <td class="py-4 px-6 font-bold text-emerald-600" x-text="item.matriculados"></td>
                </template>
                <template x-if="tab === 'cebas'">
                  <td class="py-4 px-6" x-text="item.vagasCebas"></td>
                  <td class="py-4 px-6" x-text="item.inscritosCebas"></td>
                  <td class="py-4 px-6" x-text="item.classificadosCebas"></td>
                  <td class="py-4 px-6 font-bold text-indigo-600" x-text="item.matriculadosCebas"></td>
                  <td class="py-4 px-6" x-text="item.listaEsperaCebas"></td>
                  <td class="py-4 px-6" x-text="item.docAnaliseCebas"></td>
                </template>
                <template x-if="tab === 'combinada'">
                  <td class="py-4 px-6" x-text="Number(item.vagas) + Number(item.vagasCebas)"></td>
                  <td class="py-4 px-6" x-text="Number(item.inscritos) + Number(item.inscritosCebas)"></td>
                  <td class="py-4 px-6" x-text="Number(item.classificados) + Number(item.classificadosCebas)"></td>
                  <td class="py-4 px-6 font-bold text-indigo-600" x-text="Number(item.matriculados) + Number(item.matriculadosCebas)"></td>
                </template>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <script>
    function dashboardData() {

        tab: 'vestibular',

        filtroPeriodo: '',

        get filteredList() {
          return this.items.filter(item => {
            if (this.tab === 'cebas' && Number(item.vagasCebas) === 0) return false;
            const matchesSearch = item.curso.toLowerCase().includes(this.searchTerm.toLowerCase());
            const matchesPeriodo = this.filtroPeriodo === '' || item.periodo === this.filtroPeriodo;
            return matchesSearch && matchesPeriodo;
          });
        },

        getKpis() {
          const list = this.filteredList;
          if (this.tab === 'cebas') {
            const vagas = list.reduce((s, i) => s + Number(i.vagasCebas), 0);
            const inscricoes = list.reduce((s, i) => s + Number(i.inscritosCebas), 0);
            const classificados = list.reduce((s, i) => s + Number(i.classificadosCebas), 0);
            const matriculados = list.reduce((s, i) => s + Number(i.matriculadosCebas), 0);
            return {
              vagas: vagas.toLocaleString('pt-BR'),
              vagasSub: 'Bolsas CEBAS',
              inscricoes: inscricoes.toLocaleString('pt-BR'),
              demanda: vagas > 0 ? (inscricoes/vagas).toFixed(1) + 'x cand/vaga' : '0',
              sucessoLabel: 'Classificados CEBAS',
              sucessoValor: classificados.toLocaleString('pt-BR'),
              taxaSucesso: 'Aprovados',
              apoioLabel: 'Matriculados CEBAS',
              apoioValor: matriculados.toLocaleString('pt-BR'),

          }

            const vagas = list.reduce((s, i) => s + Number(i.vagas) + Number(i.vagasCebas), 0);

              vagas: vagas.toLocaleString('pt-BR'),

              inscricoes: inscricoes.toLocaleString('pt-BR'),

              sucessoLabel: 'Matrículas Confirmadas',
              sucessoValor: matriculados.toLocaleString('pt-BR'),

              apoioLabel: 'Aproveitamento',

            };

          const vagas = list.reduce((s, i) => s + Number(i.vagas), 0);

          return {
            vagas: vagas.toLocaleString('pt-BR'),
            vagasSub: 'Edital Vestibular',
            inscricoes: inscricoes.toLocaleString('pt-BR'),

            sucessoLabel: 'Classificados',
            sucessoValor: classificados.toLocaleString('pt-BR'),
            taxaSucesso: 'Aprovados',
            apoioLabel: 'Matrículas Pagas',
            apoioValor: matriculados.toLocaleString('pt-BR'),
            apoioSub: 'Confirmações TOTVS'
          };
        }
      };
    }
  </script>
